services:
  postgres:
    image: postgres:16-alpine
    container_name: analytics-copilot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot_app
    volumes:
      - copilot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot -d copilot_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: analytics-copilot-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://copilot:copilot@postgres:5432/copilot_app?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-development-use-a-long-random-string-at-least-32-chars}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-change-me-in-development-use-a-long-random-string-at-least-32-chars}
      CORS_ORIGIN: http://localhost:3000
      API_PORT: 4000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: analytics-copilot-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api

volumes:
  copilot_pg_data:
